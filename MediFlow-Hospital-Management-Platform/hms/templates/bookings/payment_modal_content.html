<style>
    .payment-modal-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 12px rgba(0, 137, 123, 0.1);
        padding: 2rem;
    }
    
    .payment-modal-header {
        text-align: center;
        margin-bottom: 1.5rem;
        padding-bottom: 1.5rem;
        border-bottom: 2px solid #E0F2F1;
    }
    
    .payment-modal-header h3 {
        color: #00897B;
        font-size: 1.5rem;
        margin: 0 0 0.5rem 0;
    }
    
    .payment-modal-header p {
        color: #546E7A;
        margin: 0;
        font-size: 0.9rem;
    }
    
    .appointment-summary {
        background: #F7FAFA;
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        border-left: 4px solid #00897B;
    }
    
    .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.75rem;
        font-size: 0.9rem;
    }
    
    .summary-row:last-child {
        margin-bottom: 0;
    }
    
    .summary-label {
        color: #546E7A;
        font-weight: 500;
    }
    
    .summary-value {
        color: #263238;
        font-weight: 600;
    }
    
    .amount-box {
        background: linear-gradient(135deg, #E0F2F1, #B2DFDB);
        border-radius: 8px;
        padding: 1.25rem;
        margin-bottom: 1.5rem;
        text-align: center;
    }
    
    .amount-label {
        color: #00695C;
        font-size: 0.85rem;
        text-transform: uppercase;
        font-weight: 600;
        margin-bottom: 0.5rem;
    }
    
    .amount-value {
        color: #00897B;
        font-size: 2rem;
        font-weight: 700;
    }
    
    .pay-btn {
        width: 100%;
        background: linear-gradient(135deg, #00897B, #00695C);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .pay-btn:hover {
        background: linear-gradient(135deg, #00695C, #004D40);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(0, 137, 123, 0.3);
    }
    
    .pay-btn:active {
        transform: translateY(0);
    }
</style>

<div class="payment-modal-card">
    <div class="payment-modal-header">
        <h3><i class="fas fa-credit-card"></i> Complete Payment</h3>
        <p>Secure Razorpay Gateway</p>
    </div>
    
    <div class="appointment-summary">
        <div class="summary-row">
            <span class="summary-label"><i class="fas fa-user-md"></i> Doctor</span>
            <span class="summary-value">Dr. {{ doctor_name }}</span>
        </div>
        <div class="summary-row">
            <span class="summary-label"><i class="fas fa-calendar"></i> Date</span>
            <span class="summary-value">{{ appointment_date|date:"M d, Y" }}</span>
        </div>
        <div class="summary-row">
            <span class="summary-label"><i class="fas fa-clock"></i> Time</span>
            <span class="summary-value">{{ appointment_time|time:"H:i" }}</span>
        </div>
    </div>
    
    <div class="amount-box">
        <div class="amount-label">Consultation Fee</div>
        <div class="amount-value">₹{{ amount }}</div>
    </div>
    
    <button class="pay-btn" onclick="openRazorpayModal()">
        <i class="fas fa-lock-open"></i> Pay Now - ₹{{ amount }}
    </button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
    const csftoken = document.querySelector('[name=csrfmiddlewaretoken]') ? document.querySelector('[name=csrfmiddlewaretoken]').value : '';
    
    function openRazorpayModal() {
        const options = {
            key: '{{ settings.RAZORPAY_KEY_ID }}',
            amount: {{ amount|floatformat:2 }} * 100,
            currency: 'INR',
            name: 'MediFlow',
            description: 'Consultation Fee',
            order_id: '{{ order_id }}',
            prefill: {
                name: 'Patient',
                email: '',
                contact: ''
            },
            theme: {
                color: '#00897B'
            },
            handler: function(response) {
                if (response.razorpay_payment_id) {
                    verifyPayment(response);
                }
            }
        };
        
        const rzp = new Razorpay(options);
        rzp.open();
    }
    
    function verifyPayment(response) {
        fetch('{% url "verify_payment" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csftoken,
            },
            body: JSON.stringify({
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_order_id: response.razorpay_order_id,
                razorpay_signature: response.razorpay_signature,
                booking_id: {{ booking.id }},
                is_test_mode: {{ is_test_mode|lower|default:'false' }}
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                alert('Payment successful!');
                window.location.href = data.redirect_url;
            } else {
                alert('Error: ' + (data.message || 'Payment failed'));
            }
        })
        .catch(error => {
            alert('Error: ' + error.message);
        });
    }
</script>
